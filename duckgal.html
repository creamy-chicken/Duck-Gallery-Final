<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="duckgal.css">
    <title>Ducks of the community</title>
</head>
<body>
    <main>
        <h1>Ducks of the community</h1>
        <p>If you are checking out this website many thanks.
            Hope that these ducks will brighten your day! :)
        </p>
        <article class="gallery-grid">
            <figure>
                <img src="gallery2/duck12.jpg" alt="Duck racing across rippling water">
                <figcaption>Fast movement across the pond.</figcaption>
            </figure>
            <figure>
                <img src="gallery2/duck13.jpg" alt="Duck looking directly at the camera">
                <figcaption>A glance at the camera.</figcaption>
            </figure>
            <figure>
                <img src="gallery2/duck3.jpg" alt="Duck standing near fallen leaves at the water's edge">
                <figcaption>Leaves, water, and a pause.</figcaption>
            </figure>
            <figure>
                <img src="gallery2/duck4.jpg" alt="Duck standing in grass near the shoreline">
                <figcaption>"Got food?"</figcaption>
            </figure>
            <figure>
                <img src="gallery2/duck5.jpg" alt="White duck floating across calm pond water">
                <figcaption>A joyful white duck.</figcaption>
            </figure>
            <figure>
                <img src="gallery2/duck6.jpg" alt="Duck walking along the muddy edge of the pond">
                <figcaption>Squinting in the sunlight.</figcaption>
            </figure>
        </article>
    </main>
</body>
</html>
